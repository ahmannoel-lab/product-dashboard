<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prompt'd Studios — Lead Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EAE6DD; --surface:#F4F1EA; --ink:#1B1A16; --ink-soft:#6B675C;
    --hair:#D4CFC3; --hot:#B23A2E; --warm:#9A6B12; --cool:#6B675C;
    --live:#3F7A4B; --recent:#9A6B12; --stale:#A99F8C;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--paper); color:var(--ink); font-family:"Archivo",system-ui,sans-serif; -webkit-font-smoothing:antialiased; line-height:1.4}
  .mono{font-family:"Space Mono",ui-monospace,monospace}
  a{color:inherit}
  header{background:var(--ink); color:var(--paper); padding:18px 22px 14px}
  .label-row{display:flex; justify-content:space-between; align-items:flex-end; gap:20px; flex-wrap:wrap; max-width:1320px; margin:0 auto}
  .brandmark{display:flex; flex-direction:column; gap:2px}
  .brandmark .wordmark{font-weight:800; letter-spacing:.18em; text-transform:uppercase; font-size:15px}
  .brandmark .sub{font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.34em; text-transform:uppercase; color:#B8B2A3}
  .specs{display:flex; gap:26px}
  .spec{font-family:"Space Mono",monospace; text-align:right}
  .spec .n{font-size:22px; font-weight:700; line-height:1}
  .spec .k{font-size:9.5px; letter-spacing:.22em; text-transform:uppercase; color:#9A9486; margin-top:5px}
  .stitch{max-width:1320px; margin:13px auto 0; border-top:1.5px dashed #4a473e}
  .controls{max-width:1320px; margin:0 auto; padding:16px 22px 6px; display:flex; flex-wrap:wrap; gap:18px 28px; align-items:flex-end}
  .field{display:flex; flex-direction:column; gap:7px}
  .field > .cap{font-family:"Space Mono",monospace; font-size:9.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft)}
  #q{font-family:"Space Mono",monospace; font-size:14px; background:transparent; border:0; border-bottom:1.5px solid var(--ink); padding:4px 2px; min-width:230px; color:var(--ink); outline:none}
  #q::placeholder{color:#A99F8C} #q:focus{border-bottom-color:var(--hot)}
  .chips{display:flex; gap:6px; flex-wrap:wrap}
  .chip{font-family:"Space Mono",monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; padding:5px 9px; border:1px solid var(--ink); background:transparent; color:var(--ink); cursor:pointer; border-radius:0; transition:background .12s,color .12s}
  .chip[aria-pressed="true"]{background:var(--ink); color:var(--paper)}
  .chip:focus-visible{outline:2px solid var(--hot); outline-offset:2px}
  .chip.hot[aria-pressed="true"]{background:var(--hot); border-color:var(--hot)}
  .wrap{max-width:1320px; margin:8px auto 0; padding:0 22px 60px}
  table{width:100%; border-collapse:collapse}
  thead th{font-family:"Space Mono",monospace; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink); text-align:left; padding:12px 12px 9px; border-bottom:1.6px solid var(--ink); white-space:nowrap; cursor:pointer; user-select:none; position:sticky; top:0; background:var(--paper); z-index:2}
  thead th .ar{color:var(--ink-soft); margin-left:4px; font-size:9px}
  th.num,td.num{text-align:right; font-variant-numeric:tabular-nums}
  tbody td{padding:13px 12px; border-bottom:1px solid var(--hair); vertical-align:middle}
  tbody tr.brow{transition:background .1s; cursor:pointer}
  tbody tr.brow:hover{background:var(--surface)}
  tbody tr.brow.hot td:first-child{box-shadow:inset 3px 0 0 var(--hot)}
  tbody tr.brow.open{background:var(--surface)}
  .idx{font-family:"Space Mono",monospace; font-size:12px; color:var(--ink-soft)}
  .caret{display:inline-block; width:9px; color:var(--ink-soft); font-size:10px; margin-right:6px; transition:transform .15s}
  tr.brow.open .caret{transform:rotate(90deg); color:var(--hot)}
  .bn{font-weight:600; font-size:15px; letter-spacing:-.01em}
  .hn{font-family:"Space Mono",monospace; font-size:11px; color:var(--ink-soft); margin-top:2px; padding-left:15px}
  .hn a:hover{color:var(--hot)}
  td.num .v{font-family:"Space Mono",monospace; font-size:13.5px}
  .muted{color:#B3AB9B}
  .imgcount{font-family:"Space Mono",monospace; font-size:11px; color:var(--ink-soft); display:inline-flex; align-items:center; gap:5px}
  .imgcount .sq{width:7px;height:7px;border:1px solid var(--ink-soft);display:inline-block}
  .stamp{display:inline-block; font-family:"Space Mono",monospace; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:3px 7px; border:1.4px solid currentColor}
  .stamp.high{color:var(--hot); transform:rotate(-1.6deg)} .stamp.med{color:var(--warm)} .stamp.low{color:var(--cool); border-style:dashed} .stamp.none{color:#BDB6A6; border:0; padding-left:0}
  .act{display:flex; align-items:center; gap:8px}
  .dot{width:8px; height:8px; border-radius:50%; flex:0 0 auto}
  .dot.live{background:var(--live)} .dot.recent{background:var(--recent)} .dot.stale{background:var(--stale)} .dot.none{background:transparent; border:1px solid var(--stale)}
  .date{font-family:"Space Mono",monospace; font-size:12.5px} .ago{font-family:"Space Mono",monospace; font-size:10px; color:var(--ink-soft)}
  .links{font-family:"Space Mono",monospace; font-size:10.5px; display:flex; gap:10px}
  .links a{text-decoration:none; border-bottom:1px solid var(--hair); padding-bottom:1px} .links a:hover{border-bottom-color:var(--hot); color:var(--hot)}
  /* gallery */
  tr.grow td{padding:0; border-bottom:1px solid var(--hair); background:#E4E0D6}
  .gallery{padding:16px 14px 20px}
  .gallery .gmeta{font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); margin:0 0 12px 2px}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(118px,1fr)); gap:8px}
  .grid a{display:block; aspect-ratio:1/1; background:#D8D3C7 url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><rect width="20" height="20" fill="none"/></svg>') center/cover; overflow:hidden; border:1px solid var(--hair); position:relative}
  .grid img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .25s}
  .grid a:hover img{transform:scale(1.05)}
  .grid a:focus-visible{outline:2px solid var(--hot); outline-offset:2px}
  .noimg{font-family:"Space Mono",monospace; font-size:12px; color:var(--ink-soft); padding:6px 2px}
  footer{max-width:1320px; margin:0 auto; padding:0 22px 40px; font-family:"Space Mono",monospace; font-size:11px; color:var(--ink-soft); display:flex; gap:18px; align-items:center; flex-wrap:wrap}
  footer .live-dot{width:7px;height:7px;border-radius:50%;background:var(--live);display:inline-block;margin-right:6px;vertical-align:middle}
  #refresh{font-family:"Space Mono",monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; border:1px solid var(--ink); background:transparent; padding:5px 10px; cursor:pointer}
  #refresh:hover{background:var(--ink); color:var(--paper)}
  .state{padding:60px 12px; text-align:center; font-family:"Space Mono",monospace; color:var(--ink-soft); font-size:13px}
  .state b{color:var(--ink)}
  @media (max-width:760px){
    thead{display:none}
    table,tbody,tr.brow,tr.brow td{display:block; width:100%}
    tr.brow{border:1.5px solid var(--ink); margin:10px 0; padding:6px 4px; background:var(--surface)}
    tr.brow.hot{border-left-width:4px; border-left-color:var(--hot)}
    tr.brow td{border-bottom:1px dashed var(--hair); display:flex; justify-content:space-between; gap:14px; align-items:center; padding:9px 12px}
    tr.brow td:last-child{border-bottom:0}
    tr.brow td::before{content:attr(data-label); font-family:"Space Mono",monospace; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft)}
    td.num{text-align:right} .act,.links{justify-content:flex-end}
    tr.grow{display:block; margin:-6px 0 10px} tr.grow td{display:block}
    .grid{grid-template-columns:repeat(auto-fill,minmax(96px,1fr))}
  }
  @media (prefers-reduced-motion:no-preference){
    tr.brow{animation:fade .25s ease both} @keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
  }

  /* --- combined-view tabs (additive; does not touch Lead Index styles) --- */
  .tabs{max-width:1320px; margin:12px auto 0; display:flex; gap:0}
  .tabs button{font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; background:transparent; color:#B8B2A3; border:0; border-bottom:2px solid transparent; padding:8px 16px 9px; cursor:pointer}
  .tabs button[aria-pressed="true"]{color:var(--paper); border-bottom-color:var(--hot)}
  .tabs button:hover{color:var(--paper)}
  #view-approve{background:var(--paper)}
  #approveFrame{width:100%; height:calc(100vh - 168px); min-height:560px; border:0; display:block; background:#f9f9f9}
  /* --- inline grade editor (additive) --- */
  .gradeedit{display:inline-flex; align-items:center; gap:6px; cursor:pointer; user-select:none}
  .gradeedit .pen{font-family:"Space Mono",monospace; font-size:10px; color:var(--ink-soft); opacity:0; transition:opacity .12s}
  .gradeedit:hover .pen, tr.brow:hover .gradeedit .pen{opacity:1}
  #gradeMenu{position:absolute; z-index:50; background:var(--surface); border:1.5px solid var(--ink); box-shadow:3px 3px 0 rgba(27,26,22,.18); padding:4px; min-width:140px; display:none}
  #gradeMenu button{display:flex; width:100%; align-items:center; gap:9px; font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.05em; text-transform:uppercase; background:transparent; border:0; padding:8px 10px; cursor:pointer; color:var(--ink); text-align:left}
  #gradeMenu button:hover{background:var(--ink); color:var(--paper)}
  #gradeMenu button .sw{width:9px; height:9px; border:1.5px solid currentColor; display:inline-block; flex:0 0 auto}
  #gradeMenu button[data-v="High Need"] .sw{background:var(--hot); border-color:var(--hot)}
  #gradeMenu button[data-v="Medium Need"] .sw{background:var(--warm); border-color:var(--warm)}
  #gradeMenu button[data-v="Low Need"] .sw{border-style:dashed}
  #gradeMenu button[data-v=""] .sw{border-color:#BDB6A6}
  #toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--paper); font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.04em; padding:9px 14px; z-index:60; opacity:0; transition:opacity .2s; pointer-events:none; max-width:90vw}
  #toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="label-row">
    <div class="brandmark"><span class="wordmark">Prompt'd Studios</span><span class="sub">Lead Index · Active Clothing Brands</span></div>
    <div class="specs">
      <div class="spec"><div class="n" id="s-total">—</div><div class="k">In Index</div></div>
      <div class="spec"><div class="n" id="s-high" style="color:#E59B8F">—</div><div class="k">High Need</div></div>
      <div class="spec"><div class="n" id="s-active" style="color:#86C28F">—</div><div class="k">Active 7d</div></div>
    </div>
  </div>
  <div class="stitch"></div>
  <nav class="tabs">
    <button data-view="leads" aria-pressed="true">Lead Index</button>
    <button data-view="approve" aria-pressed="false">Approval Tool</button>
  </nav>
</header>
<div id="view-leads" class="view">
<div class="controls">
  <div class="field"><span class="cap">Search</span><input id="q" placeholder="brand or @handle…" autocomplete="off" /></div>
  <div class="field"><span class="cap">Need grade</span>
    <div class="chips" id="grade-chips">
      <button class="chip" data-grade="all" aria-pressed="true">All</button>
      <button class="chip hot" data-grade="High Need" aria-pressed="false">High</button>
      <button class="chip" data-grade="Medium Need" aria-pressed="false">Med</button>
      <button class="chip" data-grade="Low Need" aria-pressed="false">Low</button>
      <button class="chip" data-grade="ungraded" aria-pressed="false">Ungraded</button>
    </div></div>
  <div class="field"><span class="cap">Activity</span>
    <div class="chips" id="act-chips">
      <button class="chip" data-act="all" aria-pressed="true">All</button>
      <button class="chip" data-act="7" aria-pressed="false">≤7d</button>
      <button class="chip" data-act="30" aria-pressed="false">≤30d</button>
      <button class="chip" data-act="stale" aria-pressed="false">Stale</button>
    </div></div>
  <div class="field"><span class="cap">Source</span><div class="chips" id="src-chips"><button class="chip" data-src="all" aria-pressed="true">All</button></div></div>
</div>
<div class="wrap">
  <table>
    <thead><tr>
      <th data-sort="idx" style="width:46px">#</th>
      <th data-sort="name">Brand</th>
      <th data-sort="grade">Grade</th>
      <th data-sort="images" class="num">Images</th>
      <th data-sort="followers" class="num">Followers</th>
      <th data-sort="products" class="num">SKUs</th>
      <th data-sort="last">Last post</th>
      <th>Links</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="state" class="state">Loading the index…</div>
</div>
<footer>
  <span><span class="live-dot"></span>Live · Supabase</span>
  <span id="synced"></span><span id="shown"></span>
  <span id="imgtot"></span>
  <button id="refresh">Refresh</button>
</footer>
</div><!-- /view-leads -->
<div id="view-approve" class="view" style="display:none">
  <iframe id="approveFrame" title="Product Approval Tool"></iframe>
</div>
<div id="gradeMenu" role="menu" aria-label="Set need grade">
  <button data-v="High Need"><span class="sw"></span>High Need</button>
  <button data-v="Medium Need"><span class="sw"></span>Medium Need</button>
  <button data-v="Low Need"><span class="sw"></span>Low Need</button>
  <button data-v=""><span class="sw"></span>Ungraded</button>
</div>
<div id="toast"></div>
<script type="text/html" id="approveDoc"><!DOCTYPE html>

<body>
    <div class="header">
        <div class="header-row">
            <div>
                <h1>📸 Product Approval Dashboard</h1>
                <p class="subtitle">Select one or more products per brand &amp; grade quality needs</p>
            </div>
            <div class="header-actions">
                <a href="#" onclick="try{parent.showView('leads')}catch(e){};return false;" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;font-size:0.85rem;font-weight:600;color:#555;border:1px solid #ddd;padding:0.45rem 0.8rem;border-radius:8px;margin-right:0.5rem;background:#fff">&larr; Lead Index</a>
                <span class="count-badge" id="remainingBadge">— brands left</span>
                <button class="refresh-btn" id="refreshBtn" onclick="refresh()">↻ Refresh</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="main-content">
            <div id="content" class="loading">Loading products...</div>
        </div>
        <div class="summary">
            <h2>This session</h2>
            <p class="summary-sub" id="sessionSub">Submit each brand to clear it from the queue</p>
            <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
            <div class="session-stat"><span>Brands remaining</span><b id="statRemaining">—</b></div>
            <div class="session-stat"><span>Approved this session</span><b id="statApproved">0</b></div>
            <div class="session-stat"><span>Skipped this session</span><b id="statSkipped">0</b></div>
            <div id="summary-list" style="margin-top:1rem;"></div>
            <div class="summary-actions">
                <button class="btn btn-primary" onclick="submitAllReady()">Submit all ready brands</button>
                <button class="btn" onclick="refresh()">↻ Refresh queue</button>
            </div>
        </div>
    </div>
    <script>
        const FUNCTION_URL = 'https://jnktvftylhlyfyuessay.supabase.co/functions/v1/product-approvals';
        let approvals = {};
        let allProducts = {};
        const session = { approved: [], skipped: [] };
        async function apiCall(action, body = null) {
            const url = `${FUNCTION_URL}?action=${action}`;
            const options = { method: body ? 'PATCH' : 'GET', headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            return await response.json();
        }
        async function loadProducts() {
            try {
                const { products, brands } = await apiCall('products');
                const brandMap = {};
                brands.forEach(b => brandMap[b.id] = b.name);
                allProducts = {};
                (products || []).forEach(product => {
                    const brandId = product.brand_id;
                    if (!allProducts[brandId]) allProducts[brandId] = { name: brandMap[brandId] || 'Unknown brand', products: [] };
                    allProducts[brandId].products.push(product);
                });
                renderProducts();
            } catch (err) {
                document.getElementById('content').innerHTML = `<div class="error">Error loading products: ${err.message}</div>`;
            }
        }
        function renderProducts() {
            const brandIds = Object.keys(allProducts);
            if (brandIds.length === 0) {
                document.getElementById('content').className = '';
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <div class="big">🎉</div>
                        <h2>Queue cleared</h2>
                        <p>No brands left to review. Load more leads, then hit Refresh.</p>
                    </div>`;
                updateChrome();
                return;
            }
            document.getElementById('content').className = '';
            let html = '<div class="brands-grid">';
            Object.entries(allProducts).forEach(([brandId, brand]) => {
                const products = brand.products;
                const selected = approvals[brandId];
                const picks = (selected && selected.productIds) ? selected.productIds.length : 0;
                const ready = !!(picks && selected.grade);
                html += `<div class="brand-section" id="brand-${brandId}">
                    <div class="brand-header">
                        <div class="brand-name">${brand.name}</div>
                        <div class="brand-stats">
                            <span class="ready-pill ${ready ? 'ready' : ''}">${ready ? '✓ Ready' : 'Pending'}</span>
                            <span>${picks} selected</span>
                            <span>${products.length} products</span>
                        </div>
                    </div>
                    <div class="products-grid">${products.map(product => `
                        <div class="product-card ${selected && selected.productIds && selected.productIds.includes(product.id) ? 'selected' : ''}" onclick="selectProduct('${brandId}', '${product.id}')">
                            <div class="product-image">${selected && selected.productIds && selected.productIds.includes(product.id) ? '<div class="checkmark">✓</div>' : ''}
                                <img src="${product.raw_image_url}" alt="${(product.product_name || '').replace(/"/g, '&quot;')}" onerror="this.parentElement.innerHTML='<span class=\\'image-loading\\'>Failed to load</span>'">
                            </div>
                            <div class="product-info">
                                <div class="product-name">${product.product_name || 'Untitled'}</div>
                                <div class="product-type">${product.sku || ''}</div>
                            </div>
                        </div>`).join('')}
                    </div>
                    <div class="quality-section">
                        <div class="quality-label">Quality grade:</div>
                        <div class="quality-buttons">${['High Need', 'Medium Need', 'Low Need'].map(grade => `
                            <button class="quality-btn ${selected && selected.grade === grade ? 'selected' : ''}" onclick="selectGrade('${brandId}', '${grade}')">${grade}</button>`).join('')}
                        </div>
                    </div>
                    <div class="brand-actions">
                        <button class="btn-submit" id="submit-${brandId}" ${ready ? '' : 'disabled'} onclick="submitBrand('${brandId}')">✓ Submit &amp; Remove</button>
                        <button class="btn-skip" onclick="skipBrand('${brandId}')">Skip brand</button>
                        <span class="brand-hint">${ready ? `Saves ${picks} pick${picks === 1 ? '' : 's'} and clears the brand` : 'Pick at least one product and a grade to enable'}</span>
                    </div>
                </div>`;
            });
            html += '</div>';
            document.getElementById('content').innerHTML = html;
            updateChrome();
        }
        function selectProduct(brandId, productId) {
            if (!approvals[brandId]) approvals[brandId] = {};
            if (!approvals[brandId].productIds) approvals[brandId].productIds = [];
            const arr = approvals[brandId].productIds;
            const i = arr.indexOf(productId);
            if (i === -1) { arr.push(productId); } else { arr.splice(i, 1); }
            renderProducts();
        }
        function selectGrade(brandId, grade) {
            if (!approvals[brandId]) approvals[brandId] = {};
            approvals[brandId].grade = grade;
            renderProducts();
        }
        function animateRemove(brandId, after) {
            const el = document.getElementById('brand-' + brandId);
            if (el) { el.classList.add('removing'); setTimeout(after, 220); } else { after(); }
        }
        async function submitBrand(brandId) {
            const a = approvals[brandId];
            if (!a || !a.productIds || !a.productIds.length || !a.grade) { alert('Pick at least one product and a grade first.'); return; }
            const btn = document.getElementById('submit-' + brandId);
            if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
            try {
                await apiCall('approve', { productIds: a.productIds, grade: a.grade });
                session.approved.push({ name: allProducts[brandId].name, grade: a.grade, count: a.productIds.length });
                animateRemove(brandId, () => {
                    delete allProducts[brandId];
                    delete approvals[brandId];
                    renderProducts();
                });
            } catch (err) {
                alert('Error saving: ' + err.message);
                if (btn) { btn.disabled = false; btn.textContent = '✓ Submit & Remove'; }
            }
        }
        async function skipBrand(brandId) {
            const name = allProducts[brandId] ? allProducts[brandId].name : 'this brand';
            if (!confirm(`Skip "${name}"? It will be marked reviewed and removed from the queue (no product approved).`)) return;
            try {
                await apiCall('skip', { brandId });
                session.skipped.push({ name });
                animateRemove(brandId, () => {
                    delete allProducts[brandId];
                    delete approvals[brandId];
                    renderProducts();
                });
            } catch (err) {
                alert('Error skipping: ' + err.message);
            }
        }
        async function submitAllReady() {
            const ready = Object.entries(approvals).filter(([bid, a]) => a.productIds && a.productIds.length && a.grade && allProducts[bid]).map(([bid]) => bid);
            if (ready.length === 0) { alert('No brands have at least one product and a grade selected yet.'); return; }
            if (!confirm(`Submit ${ready.length} ready brand(s) and remove them from the queue?`)) return;
            for (const brandId of ready) {
                const a = approvals[brandId];
                try {
                    await apiCall('approve', { productIds: a.productIds, grade: a.grade });
                    session.approved.push({ name: allProducts[brandId].name, grade: a.grade, count: a.productIds.length });
                    delete allProducts[brandId];
                    delete approvals[brandId];
                } catch (err) { alert('Error saving ' + (allProducts[brandId] ? allProducts[brandId].name : brandId) + ': ' + err.message); }
            }
            renderProducts();
        }
        async function refresh() {
            const btn = document.getElementById('refreshBtn');
            if (btn) { btn.disabled = true; btn.textContent = '↻ Refreshing…'; }
            document.getElementById('content').className = 'loading';
            document.getElementById('content').innerHTML = 'Refreshing queue…';
            await loadProducts();
            if (btn) { btn.disabled = false; btn.textContent = '↻ Refresh'; }
        }
        function updateChrome() {
            const remaining = Object.keys(allProducts).length;
            const done = session.approved.length + session.skipped.length;
            const total = remaining + done;
            document.getElementById('remainingBadge').textContent = remaining + (remaining === 1 ? ' brand left' : ' brands left');
            document.getElementById('statRemaining').textContent = remaining;
            document.getElementById('statApproved').textContent = session.approved.length;
            document.getElementById('statSkipped').textContent = session.skipped.length;
            document.getElementById('progressBar').style.width = total > 0 ? Math.round((done / total) * 100) + '%' : '0%';
            const list = document.getElementById('summary-list');
            const items = [
                ...session.approved.map(s => ({ name: s.name, tag: { 'High Need': '🔴', 'Medium Need': '🟡', 'Low Need': '🟢' }[s.grade] + ' ' + s.grade + (s.count ? ` · ${s.count} pick${s.count === 1 ? '' : 's'}` : '') })),
                ...session.skipped.map(s => ({ name: s.name, tag: '⏭ Skipped' }))
            ];
            if (items.length === 0) {
                list.innerHTML = '<p style="color:#999;font-size:13px;">Nothing submitted yet this session.</p>';
            } else {
                list.innerHTML = items.map(i => `<div class="summary-item"><div class="summary-brand">${i.name}</div><div class="summary-grade">${i.tag}</div></div>`).join('');
            }
        }
        loadProducts();
    <\/script>
</body>
</html>
</script>

      <td data-label="Brand"><div class="bn"><span class="caret">▶</span>${escapeHtml(d.name||"—")}</div>
        <div class="hn">${d.instagram?`<a href="${igUrl(d.instagram)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">@${escapeHtml(d.instagram)}</a>`:""}</div></td>
      <td data-label="Grade"><span class="gradeedit" data-id="${escapeHtml(d.id||'')}" title="Click to change grade">${gradeStamp(d.need_grade)}<span class="pen">✎</span></span></td>
      <td class="num" data-label="Images"><span class="imgcount">${nimg?`<span class="sq"></span>${nimg}`:'<span class="muted">—</span>'}</span></td>
      <td class="num" data-label="Followers"><span class="v ${d.instagram_followers==null?'muted':''}">${fmtNum(d.instagram_followers)}</span></td>
      <td class="num" data-label="SKUs"><span class="v ${d.product_count==null?'muted':''}">${d.product_count==null?'—':d.product_count}</span></td>
      <td data-label="Last post"><div class="act"><span class="dot ${a.cls}"></span><span class="date ${d.ig_last_post?'':'muted'}">${fmtDate(d.ig_last_post)}</span><span class="ago">${a.cls==='none'?'':a.label}</span></div></td>
      <td data-label="Links"><div class="links" onclick="event.stopPropagation()">${site}${ig}</div></td>
    </tr>`;
    if(open) html+=`<tr class="grow"><td colspan="8">${galleryHtml(d)}</td></tr>`;
  });
  rowsEl.innerHTML=html;
  $("#shown").textContent=rows.length+" of "+DATA.length+" shown";
}
rowsEl.addEventListener("click",e=>{ if(e.target.closest(".gradeedit")) return; const tr=e.target.closest("tr.brow"); if(!tr) return; const k=tr.dataset.key; if(state.expanded.has(k)) state.expanded.delete(k); else state.expanded.add(k); render(); });
$("#q").addEventListener("input",e=>{ state.q=e.target.value.trim(); render(); });
$("#grade-chips").addEventListener("click",e=>{const b=e.target.closest(".chip");if(!b)return;[...e.currentTarget.children].forEach(c=>c.setAttribute("aria-pressed","false"));b.setAttribute("aria-pressed","true");state.grade=b.dataset.grade;render();});
$("#act-chips").addEventListener("click",e=>{const b=e.target.closest(".chip");if(!b)return;[...e.currentTarget.children].forEach(c=>c.setAttribute("aria-pressed","false"));b.setAttribute("aria-pressed","true");state.act=b.dataset.act;render();});
$("#src-chips").addEventListener("click",e=>{const b=e.target.closest(".chip");if(!b)return;[...e.currentTarget.children].forEach(c=>c.setAttribute("aria-pressed","false"));b.setAttribute("aria-pressed","true");state.src=b.dataset.src;render();});
document.querySelectorAll("thead th[data-sort]").forEach(th=>{ th.addEventListener("click",()=>{ const k=th.dataset.sort; if(state.sort===k) state.dir*=-1; else { state.sort=k; state.dir=(k==="name")?1:-1; } document.querySelectorAll("thead th .ar").forEach(n=>n.remove()); const ar=document.createElement("span"); ar.className="ar"; ar.textContent=state.dir>0?"▲":"▼"; th.appendChild(ar); render(); }); });
$("#refresh").addEventListener("click",load);
const _views={leads:document.getElementById('view-leads'),approve:document.getElementById('view-approve')};
const _frame=document.getElementById('approveFrame');
function showView(v){ for(const k in _views){ _views[k].style.display=(k===v)?'block':'none'; } document.querySelectorAll('.tabs button').forEach(b=>b.setAttribute('aria-pressed', b.dataset.view===v?'true':'false')); if(v==='approve' && !_frame.getAttribute('srcdoc')){ _frame.srcdoc=document.getElementById('approveDoc').textContent; } }
document.querySelector('.tabs').addEventListener('click',e=>{ const b=e.target.closest('button[data-view]'); if(!b) return; showView(b.dataset.view); });
/* ---- inline grade editing ---- */
const GRADE_FN="https://jnktvftylhlyfyuessay.supabase.co/functions/v1/brands-index";
const gradeMenu=document.getElementById("gradeMenu");
let gradeTargetId=null;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2400); }
function openGradeMenu(span){
  gradeTargetId=span.dataset.id;
  gradeMenu.style.display="block";
  const r=span.getBoundingClientRect();
  const cw=document.documentElement.clientWidth, ch=document.documentElement.clientHeight;
  const mw=gradeMenu.offsetWidth, mh=gradeMenu.offsetHeight;
  let left=r.left+window.scrollX; let top=r.bottom+window.scrollY+4;
  if(left+mw>window.scrollX+cw-8) left=window.scrollX+cw-mw-8;
  if(r.bottom+mh>ch-8) top=r.top+window.scrollY-mh-4;
  gradeMenu.style.left=Math.max(8,left)+"px"; gradeMenu.style.top=top+"px";
}
function closeGradeMenu(){ gradeMenu.style.display="none"; gradeTargetId=null; }
async function setGrade(id,value){
  const rec=DATA.find(d=>d.id===id); if(!rec) return;
  const prev=rec.need_grade;
  rec.need_grade=value||null; render();
  try{
    const res=await fetch(GRADE_FN,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:id,need_grade:value})});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const j=await res.json(); rec.need_grade=j.need_grade; render();
    toast("Saved \u00b7 "+(rec.name||"brand")+" \u2192 "+(j.need_grade||"Ungraded"));
  }catch(e){ rec.need_grade=prev; render(); toast("Couldn\u2019t save \u2014 reverted ("+e.message+")"); }
}
rowsEl.addEventListener("click",e=>{ const ge=e.target.closest(".gradeedit"); if(!ge) return; e.stopPropagation(); if(gradeMenu.style.display==="block"){ closeGradeMenu(); } else { openGradeMenu(ge); } });
gradeMenu.addEventListener("click",e=>{ const b=e.target.closest("button[data-v]"); if(!b) return; const id=gradeTargetId; const v=b.dataset.v; closeGradeMenu(); setGrade(id,v); });
document.addEventListener("click",e=>{ if(gradeMenu.style.display==="block" && !e.target.closest("#gradeMenu") && !e.target.closest(".gradeedit")) closeGradeMenu(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeGradeMenu(); });
window.addEventListener("resize",closeGradeMenu);
window.addEventListener("scroll",closeGradeMenu,true);
load();
</script>
